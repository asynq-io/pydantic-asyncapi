name: Tests
permissions:
  contents: read
  pull-requests: write
on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize
  schedule:
    # cron every week on monday
    - cron: "0 0 * * 1"

jobs:
  tests:
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    name: "Python ${{ matrix.python-version }}"
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.10.6"
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --locked --dev
      - name: Lint
        run: |
          uv run ruff check ./pydantic_asyncapi
          uv run ruff format --check ./pydantic_asyncapi
          uv run mypy --install-types --non-interactive pydantic_asyncapi tests
          uv run bandit -r ./pydantic_asyncapi
      - name: Test
        run: uv run pytest
